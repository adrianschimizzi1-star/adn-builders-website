<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Primary SEO -->
    <title>ADN Builders – Builder in Canberra | Renovations, New Builds & Decks</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />

      content="Licensed & fully insured builder in Canberra. Renovations, extensions, new builds, bathrooms & decks."

    <!-- Local business structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "GeneralContractor",
        "name": "ADN Builders",
        "description": "Licensed, fully insured builder in Canberra specialising in renovations, extensions, new home builds, bathrooms, and decks.",
        "areaServed": "Canberra, ACT",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Canberra",
          "addressRegion": "ACT",
          "addressCountry": "AU"
        }
      }

  </head>

    <div id="root"></div>
